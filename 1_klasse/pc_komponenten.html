<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interaktive 3D PC-Anatomie</title>
    <style>
        :root {
            --primary: #00e5ff;
            --sidebar-bg: rgba(15, 10, 25, 0.85);
            --text-main: #e0e6ed;
            --sidebar-width: 40%;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to top left, #2a0845, #ffb347);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            user-select: none;
            display: flex;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100vw - var(--sidebar-width));
            height: 100vh;
            z-index: 1;
            cursor: grab;
            background: linear-gradient(to top left, #2a0845, #ffb347);
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        /* Fixe Sidebar Rechts */
        #sidebar {
            position: absolute;
            top: 0;
            right: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.3);
        }

        #start-screen {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .btn-start {
            background: rgba(0, 229, 255, 0.1);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 15px 30px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .btn-start:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
            transform: translateY(-2px);
        }

        #tour-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .tour-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .tour-header h2 {
            margin: 0;
            color: var(--primary);
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        #accordion-container {
            flex: 1;
            overflow-y: auto;
        }

        #accordion-container::-webkit-scrollbar {
            width: 6px;
        }

        #accordion-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #accordion-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .acc-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .acc-header {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #b0b8c1;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .acc-header:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .acc-body {
            max-height: 0;
            overflow-y: auto;
            transition: max-height 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: rgba(0, 0, 0, 0.3);
        }

        .acc-body::-webkit-scrollbar {
            width: 4px;
        }

        .acc-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .acc-content {
            padding: 0 20px 15px 20px;
        }

        .acc-body strong {
            font-size: 16px;
        }

        .info-img {
            width: 100%;
            height: auto;
            min-height: 100px;
            background: #2a2530;
            border-radius: 6px;
            margin: 5px 0 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-style: italic;
            font-size: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            object-fit: cover;
        }

        .fig-cap{
            font-size: 10px;
        }

        .fig-cap a{
            color: #00e5ff;
        }

        .acc-content p {
            margin: 0 5;
            line-height: 1.5;
            color: #ddd;
            font-size: 13px;
        }

        .acc-item.active .acc-header {
            color: #fff;
            background: rgba(0, 229, 255, 0.1);
            border-left: 4px solid var(--primary);
            padding-left: 16px;
        }

        .acc-item.active .acc-body {
            max-height: 45vh;
        }

        #tooltip {
            position: absolute;
            padding: 8px 14px;
            background: var(--sidebar-bg);
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transform: translate(15px, 15px);
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
        }
        #lightbox.open { display: flex; }

        #lightbox-inner {
            position: relative;
            max-width: min(90vw, 900px);
            max-height: 90vh;
            background: rgba(15, 10, 25, 0.95);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.15);
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        #lightbox-img {
            width: 100%;
            height: auto;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 6px;
        }

        #lightbox-caption {
            font-size: 11px;
            color: #888;
        }
        #lightbox-caption a { color: var(--primary); }

        #lightbox-title {
            color: var(--primary);
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        #lightbox-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: var(--primary);
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
        }
        #lightbox-close:hover { color: #fff; }

        .info-img { cursor: zoom-in; }

        /* --- MOBILE LAYOUT (< 768px) --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #canvas-container {
                width: 100vw;
                height: 50vh;
                transition: height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            }

            #sidebar {
                width: 100vw;
                height: 50vh;
                top: 50vh;
                right: 0;
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.2);
                transition: height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), top 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            }

            body.mobile-3d-active #canvas-container {
                height: 75vh;
            }

            body.mobile-3d-active #sidebar {
                height: 25vh;
                top: 75vh;
            }

            body.mobile-panel-active #canvas-container {
                height: 25vh;
            }

            body.mobile-panel-active #sidebar {
                height: 75vh;
                top: 25vh;
            }

            .tour-header {
                padding: 10px 15px;
            }

            .tour-header h2 {
                font-size: 16px;
            }

            .acc-header {
                padding: 10px 15px;
                font-size: 13px;
            }

            .acc-content {
                padding: 0 15px 10px 15px;
            }

            .info-img {
                min-height: 80px;
                margin: 5px 0 10px 0;
            }

            .acc-content p {
                font-size: 12px;
                margin-bottom: 5px;
            }

            .acc-item.active .acc-body {
                max-height: 40vh;
            }
        }
    </style>
</head>

<body class="mobile-3d-active">

    <div id="tooltip">Komponente</div>

    <div id="lightbox">
        <div id="lightbox-inner">
            <button id="lightbox-close">✕</button>
            <p id="lightbox-title"></p>
            <img id="lightbox-img" src="" alt="">
            <div id="lightbox-caption"></div>
            <div id="lightbox-desc"></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="sidebar">
        <div id="start-screen">
            <button id="btn-start" class="btn-start">Tour starten</button>
        </div>

        <div id="tour-screen">
            <div class="tour-header">
                <h2>PC Komponenten</h2>
            </div>
            <div id="accordion-container">
                <!-- Generiert per JS -->
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- DATENSTRUKTUR ---
        const colors = {
            case: 0x454b54,
            mb: 0x1B5E20,
            cpu: 0xCFD8DC,
            ram: 0x00E5FF,
            gpu: 0xD50000,
            psu: 0xFF6D00,
            ssd: 0x2962FF,
            frontio: 0x90A4AE,
            c_mb: 0xffffff,
            c_cpu: 0x78909C,
            c_ext: 0x111111,
            c_gpu: 0xFFD600,
            c_ssd: 0xD50000
        };

        // Reduzierte Liste (Kabel sind jetzt Teil der Hauptkomponente)
        const compData = {
            'case': { 
                title: '1. PC-Gehäuse', 
                desc: '<p><strong>Weitere Bezeichnungen</strong><br> <em>Case</em>, <em>Chassis</em>, Computergehäuse.</p><p><strong>Aufgabe</strong><br> Schützt die eingebauten Bauteile vor Staub, Berührung und Beschädigung. Gibt dem Computer Stabilität und sorgt mit Lüftern, Öffnungen und Luftstrom für Kühlung.</p><p><strong>Verbindung</strong><br> Enthält Befestigungen für Motherboard, Netzteil und Laufwerke. Vorne sitzen oft Power-Knopf und eine Öffnung für das Front-Panel. Hinten befinden sich Öffnungen für Anschlüsse und Erweiterungskarten.</p><p><strong>Wissenswertes</strong><br> Es gibt verschiednigste Gehäuse, von kompakten Mini-PCs bis zu grossen Gaming-Towern.</p>', 
                source: '<a href="https://commons.wikimedia.org/wiki/File:NZXT_ATX_Case_6_2019-03-21.jpg" target="_blank"> FASTILY, <em>NZXT ATX Case</em></a> - <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a>', 
                img: './images/pc_cases.jpg' 
                },
            'mb': { title: '2. Motherboard', 
                    desc: '<p><strong>Weitere Bezeichnungen</strong><br> <em>Mainboard</em>, Hauptplatine.</p><p><strong>Aufgabe</strong><br> Zentrale Leiterplatte des Computers. Verbindet alle Komponenten elektrisch, verteilt Strom und ermöglicht Datenaustausch zwischen Prozessor, Speicher und weiteren Geräten.</p><p><strong>Verbindung</strong><br> CPU sitzt im Sockel, RAM in Steckplätzen, Grafikkarte meist im PCIe-Slot. Laufwerke, Lüfter, Front-Panel und Netzteil werden per Kabel angeschlossen.</p><p><strong>Wissenswertes</strong><br> Ursprünglich gab es zusätzliche Karten z.B. für Netzwerk oder Sound. Heute sind diese Funktionalitäten meist schon integriert.</p>', 
                    source: '<a href="https://pixabay.com/photos/motherboard-computer-plate-3406930/" target="_blank">kameng, <em>Motherboard</em></a> - <a href="https://pixabay.com/service/license-summary/" target="_blank">Pixabay Content License</a>'  , 
                    img: './images/motherboard.jpg'
                },
            'cpu': { title: '3. Prozessor (CPU)', 
                    desc: '<p><strong>Weitere Bezeichnungen</strong><br> CPU (<em>Central Processing Unit</em>), Prozessor.</p><p><strong>Aufgabe</strong><br> Führt Befehle von Programmen aus, verarbeitet Daten und steuert zentrale Abläufe des Systems. Sie gilt als „Gehirn“ des Computers.</p><p><strong>Verbindung</strong><br> Sitzt im CPU-Sockel des Motherboards. Tauscht Daten mit RAM aus und wird direkt vom Netzteil mit Strom versorgt. Benötigt meist einen Kühler.</p><p><strong>Wissenswertes</strong><br> Alte Prozessoren bestanden aus einem Kern (eine einzelne Recheneinheit). Moderne CPUs besitzen mehrere Rechenkerne für paralleles Arbeiten. Diese arbeiten mit einem Takt von ca. 2.5-4.5 GHz - das sind 2.5-4.5 Taktzyklen pro Sekunde. In jedem Takt kann die CPU je nach Aufgabe unterschiedlich viel Arbeit erledigen.</p>', 
                    source: '<a href="https://commons.wikimedia.org/wiki/File:Athlon_64_X2_E6_3800.jpg" target="_blank">Echoray, <em>Athlon 64 X2 3800+</em></a> - <a href="https://creativecommons.org/licenses/by-sa/3.0/" target="_blank">CC BY-SA 3.0</a>', 
                    img: './images/cpu.jpg'  
                },
            'ram': { title: '4. Arbeitsspeicher (RAM)', 
                    desc: '<p><strong>Weitere Bezeichnungen</strong><br> RAM (<em>Random Access Memory</em>), Arbeitsspeicher.</p><p><strong>Aufgabe</strong><br> Sehr schneller Kurzzeitspeicher für Daten und Programme, die gerade aktiv gebraucht werden. Inhalt geht beim Ausschalten verloren.</p><p><strong>Verbindung</strong><br> Steckmodule sitzen in RAM-Slots auf dem Motherboard und kommunizieren direkt mit der CPU.</p><p><strong>Wissenswertes</strong><br> Die Grösse stieg von wenigen Megabyte auf heute oft 16 bis 64 Gigabyte in Privat-PCs.</p>', 
                    source: '<a href="https://commons.wikimedia.org/wiki/File:RamTypes.JPG" target="_blank">Steve Jurvetson, <em>RAM Types</em></a> - <a href="https://creativecommons.org/licenses/by-sa/2.0/" target="_blank">CC BY-SA 2.0</a>', 
                    img: './images/ram.jpg'  
                },
            'gpu': { title: '5. Grafikkarte (GPU)', 
                    desc: '<p><strong>Weitere Bezeichnungen</strong><br> GPU (<em>Graphics Processing Unit</em>), Grafikkarte.</p><p><strong>Aufgabe</strong><br> Berechnet Bilder, 3D-Grafik, Videos und viele parallele Rechenaufgaben. Entlastet dadurch die CPU.</p><p><strong>Verbindung</strong><br> Steckt meist im PCIe-Slot des Motherboards. Leistungsstarke Modelle erhalten zusätzlichen Strom direkt vom Netzteil. Monitore werden hinten angeschlossen.</p><p><strong>Wissenswertes</strong><br>GPUs sind besonders gut bei parallelen Rechnungen, d.h. wenn ganz oft die gleiche Rechnung (mit unterschiedlichen Werten) gemacht werden muss. Z.B. um die Pixel auf einem Bildschirm zu berechnen. GPUs sind wichtig für Gaming, Videoschnitt und künstliche Intelligenz.</p>', 
                    source: '<a href="https://de.wikipedia.org/wiki/Datei:%E9%BB%91%E7%A5%9E%E8%AF%9D%EF%BC%9A%E6%82%9F%E7%A9%BA%E6%80%A7%E8%83%BD%E6%B5%8B%E8%AF%95%EF%BC%81%E9%9C%80%E8%A6%81%E4%BB%80%E4%B9%88%E6%98%BE%E5%8D%A1%E6%89%8D%E8%83%BD%E7%8E%A9%EF%BC%9F%28%E6%9E%81%E5%AE%A2%E6%B9%BEGeekerwan%29_%282160p_60fps_VP9-160kbit_Opus%29-00.00.18.325.png" target="_blank">Geekerwan, <em>GPU Performance Test Screenshot</em></a> - <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a>', 
                    img: './images/gpu.png'  
                },
            'psu': { title: '6. Netzteil (PSU) & Stromkabel', 
                    desc: '<p><strong>Weitere Bezeichnungen</strong><br> PSU (<em>Power Supply Unit</em>), Netzteil.</p><p><strong>Aufgabe</strong><br> Wandelt Wechselstrom aus der Steckdose in passende Gleichspannungen für Computerteile um und schützt oft vor Überlastung.</p><p><strong>Verbindung</strong><br> Liefert Strom per Kabel an Motherboard, CPU, Grafikkarte, Laufwerke und teils Lüfter.</p>', 
                    source: '<a href="https://commons.wikimedia.org/wiki/File:PSU-gold-full_set.jpg" target="_blank">User: unknown, <em>PSU Gold Full Set</em></a> - <a href="https://creativecommons.org/licenses/by-sa/3.0/" target="_blank">CC BY-SA 3.0</a>', 
                    img: './images/psu.jpg'  
                },
            'ssd': { title: '7. Festplatte (SSD oder HDD) & Datenkabel', 
                    desc: '<p><strong>Weitere Bezeichnungen</strong><br> SSD (<em>Solid State Drive</em>), HDD (<em>Hard Disk Drive</em>), Laufwerk, Massenspeicher.</p><p><strong>Aufgabe</strong><br> Speichert Betriebssystem, Programme und Dateien dauerhaft – auch ohne Strom.</p><p><strong>Verbindung</strong><br> Häufig per SATA-Kabel mit dem Motherboard verbunden, moderne SSDs oft direkt über M.2-Steckplatz. Diese Kabel liefern zwar auch ein bisschen Strom, aber vor allem werden hier <em>Daten</em> ausgetauscht</p><p><strong>Wissenswertes</strong><br> Eine <strong>HDD</strong> speichert Daten magnetisch auf rotierenden Scheiben mit beweglichem Lesekopf. Sie ist günstiger pro Gigabyte, aber langsamer und empfindlicher gegen Stösse. Eine <strong>SSD</strong> speichert Daten in Speicherchips ohne bewegliche Teile. Sie ist viel schneller, leiser und robuster. HDDs dominierten jahrzehntelang PCs. SSDs wurden zuerst teuer eingesetzt und haben heute in vielen Computern die HDD als Systemlaufwerk ersetzt.</p>', 
                    source: '<a href="https://commons.wikimedia.org/wiki/File:Maxtor_HDD_and_Intel_SSD_20100117.jpg" target="_blank">HDD/SSD comparison,<em>Maxtor HDD and Intel SSD</em></a> - <a href="https://creativecommons.org/licenses/by-sa/2.0/" target="_blank">CC BY-SA 2.0</a>', 
                    img: './images/hdd_ssd.jpg'  
                },
            'frontio': { title: '8. Front-Panel', 
                    desc: '<p><strong>Weitere Bezeichnungen</strong><br> Front-Panel, Front I/O (<em>Input/Output</em>), Frontanschlüsse.</p><p><strong>Aufgabe</strong><br> Bietet leicht erreichbare Anschlüsse und Tasten an der Vorderseite des Gehäuses, z. B. Power, USB oder Audio.</p><p><strong>Verbindung</strong><br> Über interne Kabel mit Pins auf dem Motherboard verbunden. Tastendruck oder eingesteckte Geräte senden Signale direkt ans Mainboard. Auch diese Kabel liefern ein wenig Strom, sind aber hauptsächlich für den Datenaustausch verantwortlich.</p>', 
                    source: '<a href="https://commons.wikimedia.org/wiki/File:Front_Panel_Audio_and_USB_ITX_Personal_Computer_Case_IMG_1798.JPG" target="_blank">Hans Haase, <em>Front Panel Audio and USB ITX Personal Computer Case</em></a> - <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a>', 
                    img: './images/frontpanel.jpg'
                }
        };


        

        const presOrder = ['case', 'mb', 'cpu', 'ram', 'gpu', 'psu', 'ssd', 'frontio'];
        let isTourActive = false;

        // --- GLOBALE VARIABLEN ---
        let scene, camera, renderer, controls, raycaster, mouse;

        const pcGroup = new THREE.Group();
        const casePanels = [];
        const componentMeshes = {};
        const pickableObjects = [];
        const fans = [];
        let ghostCase;

        let caseState = 'closed';
        let hoveredId = null;
        let hoveredMesh = null;
        let clickedId = null;

        let isAnimatingCamera = false;
        let camTargetPos = new THREE.Vector3();
        let camTargetLook = new THREE.Vector3();
        let camStartPos = new THREE.Vector3();
        let camStartLook = new THREE.Vector3();
        let camAnimProgress = 0;

        // Pulssysstem
        const activePulses = [];
        let frameCount = 0;
        let nextDataBurst = 0;
        const pulseGroup = new THREE.Group();

        const canvasEl = document.getElementById('canvas-container');
        const sidebarEl = document.getElementById('sidebar');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.add(pulseGroup);

            camera = new THREE.PerspectiveCamera(45, canvasEl.clientWidth / canvasEl.clientHeight, 0.1, 1000);
            camera.position.set(16, 12, 18);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(canvasEl.clientWidth, canvasEl.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            canvasEl.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);
            const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
            fillLight.position.set(-10, 0, 5);
            scene.add(fillLight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 40;
            controls.minDistance = 5;
            controls.target.set(0, 0, 0);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            buildComputer();
            scene.add(pcGroup);
            buildSidebar();

            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-close').addEventListener('click', () => lb.classList.remove('open'));
            lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
            document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });

            const abortCamera = () => { isAnimatingCamera = false; };
            canvasEl.addEventListener('pointerdown', abortCamera);
            canvasEl.addEventListener('wheel', abortCamera);

            canvasEl.addEventListener('mousemove', onMouseMove);

            let pointerDownPos = { x: 0, y: 0 };
            canvasEl.addEventListener('pointerdown', (e) => {
                pointerDownPos.x = e.clientX;
                pointerDownPos.y = e.clientY;
                if (window.innerWidth <= 768) {
                    document.body.classList.add('mobile-3d-active');
                    document.body.classList.remove('mobile-panel-active');
                    updateCameraZoom();
                }
            });

            canvasEl.addEventListener('pointerup', (e) => {
                const dist = Math.hypot(e.clientX - pointerDownPos.x, e.clientY - pointerDownPos.y);
                if (dist < 5) onClick(e);
            });

            sidebarEl.addEventListener('pointerdown', () => {
                if (window.innerWidth <= 768) {
                    document.body.classList.add('mobile-panel-active');
                    document.body.classList.remove('mobile-3d-active');
                    updateCameraZoom();
                }
            });

            document.getElementById('btn-start').addEventListener('click', () => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('tour-screen').style.display = 'flex';
                isTourActive = true;

                if (window.innerWidth <= 768) {
                    document.body.classList.add('mobile-panel-active');
                    document.body.classList.remove('mobile-3d-active');
                    updateCameraZoom();
                }

                showPresStep('case');
            });

            const resizeObserver = new ResizeObserver(() => { onWindowResize(); });
            resizeObserver.observe(canvasEl);
        }

        function buildSidebar() {
            const container = document.getElementById('accordion-container');
            container.innerHTML = '';

            presOrder.forEach((id) => {
                const data = compData[id];
                const item = document.createElement('div');
                item.className = 'acc-item';
                item.id = 'acc-' + id;

                const header = document.createElement('div');
                header.className = 'acc-header';
                header.innerText = data.title;
                header.onclick = () => {
                    if (clickedId === id && id !== 'case') deselectAll();
                    else showPresStep(id);
                };

                const body = document.createElement('div');
                body.className = 'acc-body';

                const content = document.createElement('div');
                content.className = 'acc-content';
                content.innerHTML = `
                    <figure>
                        <img class="info-img" src="${data.img}" alt="Bild: ${data.title}">
                        <figcaption class="fig-cap">Source: ${data.source}</figcaption>
                    </figure>
                    <p>${data.desc}</p>
                `;
                const img = content.querySelector('.info-img');
                img.addEventListener('click', () => {
                    document.getElementById('lightbox-img').src = data.img;
                    document.getElementById('lightbox-img').alt = data.title;
                    document.getElementById('lightbox-title').textContent = data.title;
                    document.getElementById('lightbox-caption').innerHTML = `Source: ${data.source}`;
                    document.getElementById('lightbox-desc').innerHTML = `${data.desc}`
                    document.getElementById('lightbox').classList.add('open');
                });

                body.appendChild(content);
                item.appendChild(header);
                item.appendChild(body);
                container.appendChild(item);
            });
        }

        function registerComponentMesh(id, mesh) {
            if (!componentMeshes[id]) componentMeshes[id] = [];
            mesh.userData.compId = id;
            componentMeshes[id].push(mesh);
            pickableObjects.push(mesh);
        }

        function createBox(w, h, d, color, id) {
            const mat = new THREE.MeshStandardMaterial({
                color: color, roughness: 0.5, metalness: 0.3,
                transparent: true, opacity: 0.25
            });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.userData.origColor = color;
            if (id) registerComponentMesh(id, mesh);
            return mesh;
        }

        function createCylinder(rT, rB, h, s, color, id) {
            const mat = new THREE.MeshStandardMaterial({
                color: color, roughness: 0.6,
                transparent: true, opacity: 0.25
            });
            const mesh = new THREE.Mesh(new THREE.CylinderGeometry(rT, rB, h, s), mat);
            mesh.userData.origColor = color;
            if (id) registerComponentMesh(id, mesh);
            return mesh;
        }

        function createCable(points, radius, color, id) {
            const curve = new THREE.CatmullRomCurve3(points);
            const mat = new THREE.MeshStandardMaterial({
                color: color, transparent: true, opacity: 0.25
            });
            const mesh = new THREE.Mesh(new THREE.TubeGeometry(curve, 48, radius, 8, false), mat);
            mesh.userData.origColor = color;
            mesh.userData.curve = curve;
            mesh.userData.cableRadius = radius; // Für Oberflächen-Datenbits
            if (id) registerComponentMesh(id, mesh);
            pcGroup.add(mesh);
            return mesh;
        }

        function moveCameraTo(compId) {
            const views = {
                'mb': { pos: new THREE.Vector3(-14, 5, 4), look: new THREE.Vector3(0.9, 0.4, -0.6) },
                'cpu': { pos: new THREE.Vector3(-10, 6, 0), look: new THREE.Vector3(0.88, 1.4, -1.0) },
                'ram': { pos: new THREE.Vector3(-10, 6, 1), look: new THREE.Vector3(0.85, 1.4, -0.3) },
                'gpu': { pos: new THREE.Vector3(-12, 0, 3), look: new THREE.Vector3(0.2, -0.4, -1.0) },
                'psu': { pos: new THREE.Vector3(-10, 4, -9), look: new THREE.Vector3(0.0, -1.8, -1.4) },
                'ssd': { pos: new THREE.Vector3(-11, -1, 7), look: new THREE.Vector3(0.2, -1.58, 1.4) },
                'frontio': { pos: new THREE.Vector3(-8, 7, 11), look: new THREE.Vector3(0, 1.5, 2.25) },
                'reset': { pos: new THREE.Vector3(-16, 10, 18), look: new THREE.Vector3(0, 0, 0) }
            };

            if (compId === 'case') compId = 'reset';

            if (views[compId]) {
                camTargetPos.copy(views[compId].pos);
                camTargetLook.copy(views[compId].look);
                camStartPos.copy(camera.position);
                camStartLook.copy(controls.target);
                camAnimProgress = 0;
                isAnimatingCamera = true;
            }
        }

        function openCase() {
            if (caseState === 'opened' || caseState === 'opening') return;
            caseState = 'opening';
            casePanels.forEach(p => {
                p.mesh.visible = true;
                p.mesh.material.transparent = true;
                p.mesh.material.opacity = 1.0;
                p.mesh.material.needsUpdate = true;
                p.mesh.position.copy(p.closedPos);
            });
        }

        function closeCase() {
            if (caseState === 'closed' || caseState === 'closing') return;
            caseState = 'closing';
            casePanels.forEach(p => {
                p.mesh.visible = true;
                p.mesh.material.transparent = true;
                p.mesh.material.opacity = 0;
                p.mesh.material.needsUpdate = true;
            });
        }

        function updateMaterials() {
            const overviewMode = isTourActive && clickedId === null;
            Object.keys(componentMeshes).forEach(id => {
                const isHovered = (id === hoveredId);
                const isClicked = (id === clickedId);
                const shouldBeSolid = isHovered || isClicked || overviewMode;

                componentMeshes[id].forEach(mesh => {
                    if (mesh.userData.isFan) {
                        mesh.material.wireframe = true;
                        const isCaseClosedExternal = (caseState === 'closed' && mesh.userData.isExternal);

                        if (shouldBeSolid || isCaseClosedExternal) mesh.userData.solidBg.visible = true;
                        else mesh.userData.solidBg.visible = false;

                        if (shouldBeSolid) {
                            mesh.material.color.setHex(0xaaaaaa);
                            mesh.material.emissive.setHex(0x555555);
                            mesh.material.opacity = 1.0;
                        } else {
                            mesh.material.color.setHex(mesh.userData.origColor);
                            mesh.material.emissiveIntensity = 0;
                            mesh.material.opacity = 0.25;
                        }
                        return;
                    }

                    mesh.material.wireframe = false;

                    if (shouldBeSolid || (caseState === 'closed' && mesh.userData.isExternal)) {
                        mesh.material.opacity = 1.0;
                    } else {
                        mesh.material.opacity = 0.25;
                    }

                    if (shouldBeSolid) {
                        mesh.material.emissive.setHex(mesh.material.color.getHex());
                    } else {
                        mesh.material.emissiveIntensity = 0;
                    }
                });
            });
        }

        function showPresStep(id) {
            clickedId = id;
            moveCameraTo(clickedId);

            document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('active'));
            const activeAcc = document.getElementById('acc-' + clickedId);
            if (activeAcc) {
                activeAcc.classList.add('active');
                setTimeout(() => {
                    activeAcc.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }

            if (clickedId === 'case') closeCase();
            else openCase();

            pulseGroup.clear();
            activePulses.length = 0;
            preFillForId(clickedId);
            updateMaterials();
        }

        function deselectAll() {
            clickedId = null;
            document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('active'));
            moveCameraTo('reset');
            pulseGroup.clear();
            activePulses.length = 0;
            preFillAll();
            updateMaterials();
        }

        function getScreenPos(mesh) {
            const wp = new THREE.Vector3();
            mesh.getWorldPosition(wp);
            wp.project(camera);
            const rect = canvasEl.getBoundingClientRect();
            return {
                x: (wp.x + 1) / 2 * rect.width + rect.left,
                y: -(wp.y - 1) / 2 * rect.height + rect.top
            };
        }

        function preFillForId(id) {
            const type = (id === 'psu') ? 'power' : 'data';
            const count = 7;
            componentMeshes[id] && componentMeshes[id].forEach(mesh => {
                if (!mesh.userData.curve) return;
                for (let i = 0; i < count; i++) spawnPulse(mesh, type, i / count);
            });
        }

        function preFillAll() {
            preFillForId('psu');
            preFillForId('ssd');
            preFillForId('frontio');
        }

        // --- PULS ANIMATIONEN (KABEL) ---
        function spawnPulse(cableMesh, type, startT = null) {
            const curve = cableMesh.userData.curve;
            if (!curve) return;

            let mesh, speed, dir;

            if (type === 'power') {
                const r = (cableMesh.userData.cableRadius || 0.06) + 0.005;
                const core = new THREE.Mesh(
                    new THREE.SphereGeometry(r, 8, 8),
                    new THREE.MeshBasicMaterial({
                        color: 0xffdd55,
                        transparent: true,
                        opacity: 0.95,
                        blending: THREE.AdditiveBlending
                    })
                );
                const halo = new THREE.Mesh(
                    new THREE.SphereGeometry(r * 1.1, 8, 8),
                    new THREE.MeshBasicMaterial({
                        color: 0xffaa00,
                        transparent: true,
                        opacity: 0.18,
                        blending: THREE.AdditiveBlending
                    })
                );
                core.add(halo);
                mesh = core;
                speed = 0.005;
                dir = (cableMesh.userData.origColor === colors.c_ext) ? -1 : 1;
            } else if (type === 'data') {
                // Daten-Bits flitzen auf der Aussenhülle!
                mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.02, 8, 8),
                    new THREE.MeshBasicMaterial({
                        color: 0x00e5ff,
                        transparent: true,
                        blending: THREE.AdditiveBlending
                    })
                );
                speed = 0.015;
                dir = Math.random() > 0.5 ? 1 : -1;

                // Offset berechnen (Radius + leicht darüber)
                const radius = cableMesh.userData.cableRadius + 0.01;
                const angle = Math.random() * Math.PI * 2;
                mesh.userData.offsetRadius = radius;
                mesh.userData.offsetAngle = angle;
            }

            pulseGroup.add(mesh);
            activePulses.push({
                mesh: mesh, curve: curve,
                t: startT !== null ? startT : (dir === 1 ? 0 : 1),
                speed: speed, dir: dir, type: type
            });
        }

        function onMouseMove(event) {
            if (!isTourActive) return;

            const rect = canvasEl.getBoundingClientRect();
            if (event.clientX < rect.left || event.clientX > rect.right || event.clientY < rect.top || event.clientY > rect.bottom) {
                hoveredId = null;
                hoveredMesh = null;
                document.getElementById('tooltip').style.opacity = 0;
                document.body.style.cursor = 'default';
                updateMaterials();
                return;
            }

            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(pickableObjects.filter(m => m.visible));

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                hoveredMesh = hit;
                const tt = document.getElementById('tooltip');
                if (hit.userData.tooltipOnly) {
                    tt.innerText = hit.userData.tooltipOnly;
                    tt.style.opacity = 1;
                    document.body.style.cursor = 'default';
                    hoveredId = null;
                } else {
                    hoveredId = hit.userData.compId;
                    document.body.style.cursor = 'pointer';
                    tt.innerText = compData[hoveredId].title.replace(/^\d+\.\s*/, '');
                    tt.style.opacity = 1;
                }
            } else {
                hoveredId = null;
                hoveredMesh = null;
                document.body.style.cursor = 'default';
                document.getElementById('tooltip').style.opacity = 0;
            }
            updateMaterials();
        }

        function onClick(event) {
            if (!isTourActive) return;
            const rect = canvasEl.getBoundingClientRect();
            if (event.clientX < rect.left || event.clientX > rect.right || event.clientY < rect.top || event.clientY > rect.bottom) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(pickableObjects.filter(m => m.visible));

            if (intersects.length > 0) {
                if (!intersects[0].object.userData.tooltipOnly) {
                    const hitId = intersects[0].object.userData.compId;
                    if (hitId === clickedId) deselectAll();
                    else showPresStep(hitId);
                }
                // tooltipOnly: do nothing
            } else {
                deselectAll();
            }
        }

        function updateCameraZoom() {
            if (window.innerWidth <= 768) {
                if (document.body.classList.contains('mobile-panel-active')) {
                    camera.zoom = 1.3;
                } else {
                    camera.zoom = 1.0;
                }
            } else {
                camera.zoom = 1.0;
            }
            camera.updateProjectionMatrix();
        }

        function onWindowResize() {
            const width = canvasEl.clientWidth;
            const height = canvasEl.clientHeight;
            camera.aspect = width / height;
            updateCameraZoom();
            renderer.setSize(width, height);
        }

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (isAnimatingCamera) {
                camAnimProgress += 0.025;
                if (camAnimProgress >= 1) {
                    camAnimProgress = 1;
                    isAnimatingCamera = false;
                }
                const t = camAnimProgress < 0.5
                    ? 4 * camAnimProgress * camAnimProgress * camAnimProgress
                    : 1 - Math.pow(-2 * camAnimProgress + 2, 3) / 2;

                camera.position.lerpVectors(camStartPos, camTargetPos, t);
                controls.target.lerpVectors(camStartLook, camTargetLook, t);
            }

            controls.update();
            fans.forEach(fan => {
                fan.rotation.y += 0.5;
            });

            // Pulsierendes Leuchten (Kabel pulsieren NICHT im Material, sondern haben fliessende Partikel)
            if (clickedId && componentMeshes[clickedId]) {
                componentMeshes[clickedId].forEach(mesh => {
                    if (!mesh.userData.isFan && !mesh.userData.curve) {
                        mesh.material.emissiveIntensity = 0.4 + Math.sin(performance.now() * 0.012) * 0.2;
                    }
                });
            }
            if (hoveredId && hoveredId !== clickedId && componentMeshes[hoveredId]) {
                componentMeshes[hoveredId].forEach(mesh => {
                    if (!mesh.userData.isFan && !mesh.userData.curve) {
                        mesh.material.emissiveIntensity = 0.25;
                    }
                });
            }
            casePanels.forEach(p => {
                if (clickedId === 'case') {
                    p.mesh.material.emissive.setHex(colors.case);
                    p.mesh.material.emissiveIntensity = 0.4 + Math.sin(performance.now() * 0.012) * 0.2;
                } else {
                    p.mesh.material.emissiveIntensity = 0;
                }
            });

            // --- Kabel Pulse Updates ---
            frameCount++;
            if (clickedId === 'psu' || clickedId === null) {
                if (frameCount % 20 === 0) {
                    componentMeshes['psu'] && componentMeshes['psu'].forEach(mesh => {
                        if (mesh.userData.curve) spawnPulse(mesh, 'power');
                    });
                }
            }
            const dataSources = clickedId === null ? ['ssd', 'frontio'] : (clickedId === 'ssd' || clickedId === 'frontio') ? [clickedId] : [];
            if (dataSources.length > 0 && Date.now() > nextDataBurst) {
                if (Math.random() > 0.6) {
                    dataSources.forEach(cid => {
                        componentMeshes[cid] && componentMeshes[cid].forEach(mesh => {
                            if (mesh.userData.curve) spawnPulse(mesh, 'data');
                        });
                    });
                }
                if (Math.random() > 0.95) nextDataBurst = Date.now() + 400;
            }

            // Tooltip an 3D-Position heften
            if (hoveredMesh) {
                const sp = getScreenPos(hoveredMesh);
                const tt = document.getElementById('tooltip');
                tt.style.left = sp.x + 'px';
                tt.style.top = (sp.y - 48) + 'px';
            }

            for (let i = activePulses.length - 1; i >= 0; i--) {
                const p = activePulses[i];
                p.t += p.speed * p.dir;

                if (p.t < 0 || p.t > 1) {
                    pulseGroup.remove(p.mesh);
                    activePulses.splice(i, 1);
                    continue;
                }

                const pos = p.curve.getPointAt(p.t);

                if (p.type === 'data') {
                    // Partikel auf der Oberfläche des Kabels platzieren
                    const tangent = p.curve.getTangentAt(p.t);
                    // Hilfsvektor für Rotation
                    const axis = new THREE.Vector3(0, 1, 0);
                    if (Math.abs(tangent.y) > 0.9) axis.set(1, 0, 0);

                    const normal = new THREE.Vector3().crossVectors(tangent, axis).normalize();
                    const binormal = new THREE.Vector3().crossVectors(tangent, normal).normalize();

                    // Offset-Berechnung mittels Kreisgleichung
                    const r = p.mesh.userData.offsetRadius;
                    const a = p.mesh.userData.offsetAngle;

                    const offset = new THREE.Vector3();
                    offset.addScaledVector(normal, Math.cos(a) * r);
                    offset.addScaledVector(binormal, Math.sin(a) * r);

                    p.mesh.position.copy(pos).add(offset);
                } else {
                    // Stromkugeln bleiben mittig im Kabel
                    p.mesh.position.copy(pos);
                }
            }

            // Gehäuse Animation
            if (caseState === 'opening') {
                let allDone = true;
                if (ghostCase.children[0].material.opacity < 0.3) {
                    ghostCase.children.forEach(c => c.material.opacity += 0.02);
                }
                casePanels.forEach(p => {
                    p.mesh.position.lerp(p.openPos, 0.05);
                    p.mesh.material.opacity -= 0.04;
                    if (p.mesh.position.distanceTo(p.openPos) > 0.1) allDone = false;
                });
                if (allDone) {
                    caseState = 'opened';
                    casePanels.forEach(p => p.mesh.visible = false);
                }
            } else if (caseState === 'closing') {
                let allDone = true;
                if (ghostCase.children[0].material.opacity > 0) {
                    ghostCase.children.forEach(c => c.material.opacity -= 0.02);
                }
                casePanels.forEach(p => {
                    p.mesh.material.opacity += 0.05;
                    if (p.mesh.material.opacity > 1) {
                        p.mesh.material.opacity = 1;
                        p.mesh.material.transparent = false; // Solid wenn zu
                    }
                    p.mesh.position.lerp(p.closedPos, 0.1);
                    if (p.mesh.position.distanceTo(p.closedPos) > 0.05) allDone = false;
                });
                if (allDone) {
                    caseState = 'closed';
                    updateMaterials();
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
