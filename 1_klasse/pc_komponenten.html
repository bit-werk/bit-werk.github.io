<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interaktive 3D PC-Anatomie</title>
    <style>
        :root {
            --primary: #00e5ff;
            --sidebar-bg: rgba(15, 10, 25, 0.85);
            --text-main: #e0e6ed;
            --sidebar-width: 400px;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to top left, #2a0845, #ffb347);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            user-select: none;
            display: flex;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100vw - var(--sidebar-width));
            height: 100vh;
            z-index: 1;
            cursor: grab;
            background: linear-gradient(to top left, #2a0845, #ffb347);
        }
        #canvas-container:active { cursor: grabbing; }

        /* Fixe Sidebar Rechts */
        #sidebar {
            position: absolute;
            top: 0;
            right: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-left: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 40px rgba(0,0,0,0.3);
        }

        #start-screen {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .btn-start {
            background: rgba(0, 229, 255, 0.1);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 15px 30px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .btn-start:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
            transform: translateY(-2px);
        }

        #tour-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .tour-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        
        .tour-header h2 {
            margin: 0;
            color: var(--primary);
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        #accordion-container {
            flex: 1;
            overflow-y: auto;
        }

        #accordion-container::-webkit-scrollbar { width: 6px; }
        #accordion-container::-webkit-scrollbar-track { background: transparent; }
        #accordion-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .acc-item { border-bottom: 1px solid rgba(255,255,255,0.05); }

        .acc-header {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #b0b8c1;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .acc-header:hover { color: #fff; background: rgba(255,255,255,0.05); }

        .acc-body {
            max-height: 0;
            overflow-y: auto;
            transition: max-height 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: rgba(0,0,0,0.3);
        }

        .acc-body::-webkit-scrollbar { width: 4px; }
        .acc-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }

        .acc-content { padding: 0 20px 15px 20px; }

        .info-img {
            width: 100%;
            height: auto;
            min-height: 100px;
            background: #2a2530;
            border-radius: 6px;
            margin: 5px 0 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-style: italic;
            font-size: 12px;
            border: 1px dashed rgba(255,255,255,0.2);
            object-fit: cover;
        }

        .acc-content p {
            margin: 0;
            line-height: 1.5;
            color: #ddd;
            font-size: 13px;
        }

        .acc-item.active .acc-header {
            color: #fff;
            background: rgba(0, 229, 255, 0.1);
            border-left: 4px solid var(--primary);
            padding-left: 16px;
        }

        .acc-item.active .acc-body { max-height: 45vh; } 

        #tooltip {
            position: absolute;
            padding: 8px 14px;
            background: var(--sidebar-bg);
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transform: translate(15px, 15px);
        }

        /* --- MOBILE LAYOUT (< 768px) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }

            #canvas-container {
                width: 100vw;
                height: 50vh;
                transition: height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            #sidebar {
                width: 100vw;
                height: 50vh;
                top: 50vh;
                right: 0;
                border-left: none;
                border-top: 1px solid rgba(255,255,255,0.2);
                transition: height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), top 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            }

            body.mobile-3d-active #canvas-container { height: 75vh; }
            body.mobile-3d-active #sidebar { height: 25vh; top: 75vh; }

            body.mobile-panel-active #canvas-container { height: 25vh; }
            body.mobile-panel-active #sidebar { height: 75vh; top: 25vh; }

            .tour-header { padding: 10px 15px; }
            .tour-header h2 { font-size: 16px; }
            .acc-header { padding: 10px 15px; font-size: 13px; }
            .acc-content { padding: 0 15px 10px 15px; }
            .info-img { min-height: 80px; margin: 5px 0 10px 0; }
            .acc-content p { font-size: 12px; }

            .acc-item.active .acc-body { max-height: 40vh; } 
        }
    </style>
</head>
<body class="mobile-3d-active">

    <div id="tooltip">Komponente</div>

    <div id="canvas-container"></div>

    <div id="sidebar">
        <div id="start-screen">
            <button id="btn-start" class="btn-start">Tour starten</button>
        </div>

        <div id="tour-screen">
            <div class="tour-header">
                <h2>PC Komponenten</h2>
            </div>
            <div id="accordion-container">
                <!-- Generiert per JS -->
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- DATENSTRUKTUR ---
        const colors = {
            case: 0x454b54,    
            mb: 0x1B5E20,      
            cpu: 0xCFD8DC,     
            ram: 0x00E5FF,     
            gpu: 0xD50000,     
            psu: 0xFF6D00,     
            ssd: 0x2962FF,     
            frontio: 0x90A4AE, 
            c_mb: 0xffffff,    
            c_cpu: 0x78909C,   
            c_ext: 0x111111,   
            c_gpu: 0xFFD600,   
            c_ssd: 0xD50000    
        };

        // Reduzierte Liste (Kabel sind jetzt Teil der Hauptkomponente)
        const compData = {
            'case': { title: '1. PC-Gehäuse', desc: 'Das Gehäuse schützt alle Bauteile. Hinten siehst du Anschlüsse für Strom und Peripheriegeräte. Vorne befindet sich das Front-Panel mit dem Power-Button.' },
            'mb': { title: '2. Motherboard', desc: 'Die Hauptplatine. Sie verbindet alle Bauteile elektronisch. Das hintere Anschlusspanel ragt direkt aus dem Gehäuse heraus.' },
            'cpu': { title: '3. Prozessor (CPU)', desc: 'Das Gehirn des Computers. Sitzt auf dem Sockel des Motherboards und berechnet alle logischen Aufgaben.' },
            'ram': { title: '4. Arbeitsspeicher (RAM)', desc: 'Zwei Module neben der CPU. Der extrem schnelle Kurzzeitspeicher für Daten, die jetzt gerade verarbeitet werden.' },
            'gpu': { title: '5. Grafikkarte (GPU)', desc: 'Übernimmt alle komplexen 3D-Berechnungen für Spiele. Ihre Monitor-Anschlüsse ragen hinten aus dem PC heraus.' },
            'psu': { title: '6. Netzteil (PSU) & Stromkabel', desc: 'Wandelt Strom aus der Steckdose um. Die sichtbaren Kabel versorgen Motherboard (weiß), CPU (grau) und GPU (gelb) sicher mit Energie.' },
            'ssd': { title: '7. SSD & Datenkabel', desc: 'Der Langzeitspeicher für Windows und Bilder. Sie sitzt im Laufwerksschacht und sendet Daten über das rote SATA-Kabel ans Motherboard.' },
            'frontio': { title: '8. Front-Panel', desc: 'Die Front-Anschlüsse (USB, Audio) und der Startknopf. Ein internes Kabel leitet die Signale direkt ans Motherboard.' }
        };

        const presOrder = ['case', 'mb', 'cpu', 'ram', 'gpu', 'psu', 'ssd', 'frontio'];
        let isTourActive = false;

        // --- GLOBALE VARIABLEN ---
        let scene, camera, renderer, controls, raycaster, mouse;
        
        const pcGroup = new THREE.Group();
        const casePanels = [];          
        const componentMeshes = {};     
        const pickableObjects = [];     
        const fans = [];                
        let ghostCase;                  
        
        let caseState = 'closed'; 
        let hoveredId = null;
        let clickedId = null;

        let isAnimatingCamera = false;
        let camTargetPos = new THREE.Vector3();
        let camTargetLook = new THREE.Vector3();
        let camStartPos = new THREE.Vector3();
        let camStartLook = new THREE.Vector3();
        let camAnimProgress = 0;

        // Pulssysstem
        const activePulses = [];
        let frameCount = 0;
        let nextDataBurst = 0;
        const pulseGroup = new THREE.Group();

        const canvasEl = document.getElementById('canvas-container');
        const sidebarEl = document.getElementById('sidebar');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.add(pulseGroup);

            camera = new THREE.PerspectiveCamera(45, canvasEl.clientWidth / canvasEl.clientHeight, 0.1, 1000);
            camera.position.set(16, 12, 18);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(canvasEl.clientWidth, canvasEl.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            canvasEl.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);
            const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
            fillLight.position.set(-10, 0, 5);
            scene.add(fillLight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 40;
            controls.minDistance = 5;
            controls.target.set(0, 0, 0);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            buildComputer();
            scene.add(pcGroup);
            buildSidebar();

            const abortCamera = () => { isAnimatingCamera = false; };
            canvasEl.addEventListener('pointerdown', abortCamera);
            canvasEl.addEventListener('wheel', abortCamera);
            
            canvasEl.addEventListener('mousemove', onMouseMove);
            
            let pointerDownPos = { x: 0, y: 0 };
            canvasEl.addEventListener('pointerdown', (e) => {
                pointerDownPos.x = e.clientX;
                pointerDownPos.y = e.clientY;
                if (window.innerWidth <= 768) {
                    document.body.classList.add('mobile-3d-active');
                    document.body.classList.remove('mobile-panel-active');
                    updateCameraZoom();
                }
            });

            canvasEl.addEventListener('pointerup', (e) => {
                const dist = Math.hypot(e.clientX - pointerDownPos.x, e.clientY - pointerDownPos.y);
                if (dist < 5) onClick(e);
            });

            sidebarEl.addEventListener('pointerdown', () => {
                if (window.innerWidth <= 768) {
                    document.body.classList.add('mobile-panel-active');
                    document.body.classList.remove('mobile-3d-active');
                    updateCameraZoom();
                }
            });
            
            document.getElementById('btn-start').addEventListener('click', () => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('tour-screen').style.display = 'flex';
                isTourActive = true;
                
                if (window.innerWidth <= 768) {
                    document.body.classList.add('mobile-panel-active');
                    document.body.classList.remove('mobile-3d-active');
                    updateCameraZoom();
                }
                
                showPresStep('case'); 
            });

            const resizeObserver = new ResizeObserver(() => { onWindowResize(); });
            resizeObserver.observe(canvasEl);
        }

        function buildSidebar() {
            const container = document.getElementById('accordion-container');
            container.innerHTML = '';

            presOrder.forEach((id) => {
                const data = compData[id];
                const item = document.createElement('div');
                item.className = 'acc-item';
                item.id = 'acc-' + id;

                const header = document.createElement('div');
                header.className = 'acc-header';
                header.innerText = data.title;
                header.onclick = () => {
                    if(clickedId === id) deselectAll();
                    else showPresStep(id);
                };

                const body = document.createElement('div');
                body.className = 'acc-body';

                const content = document.createElement('div');
                content.className = 'acc-content';
                content.innerHTML = `
                    <img class="info-img" src="BILD_LINK_HIER_EINFUEGEN.jpg" alt="Bild: ${data.title}">
                    <p>${data.desc}</p>
                `;

                body.appendChild(content);
                item.appendChild(header);
                item.appendChild(body);
                container.appendChild(item);
            });
        }

        function registerComponentMesh(id, mesh) {
            if (!componentMeshes[id]) componentMeshes[id] = [];
            mesh.userData.compId = id;
            componentMeshes[id].push(mesh);
            pickableObjects.push(mesh);
        }

        function createBox(w, h, d, color, id) {
            const mat = new THREE.MeshStandardMaterial({ 
                color: color, roughness: 0.5, metalness: 0.3, 
                transparent: true, opacity: 0.25 
            });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.userData.origColor = color;
            if (id) registerComponentMesh(id, mesh);
            return mesh;
        }

        function createCylinder(rT, rB, h, s, color, id) {
            const mat = new THREE.MeshStandardMaterial({ 
                color: color, roughness: 0.6, 
                transparent: true, opacity: 0.25 
            });
            const mesh = new THREE.Mesh(new THREE.CylinderGeometry(rT, rB, h, s), mat);
            mesh.userData.origColor = color;
            if (id) registerComponentMesh(id, mesh);
            return mesh;
        }

        function createCable(points, radius, color, id) {
            const curve = new THREE.CatmullRomCurve3(points);
            const mat = new THREE.MeshStandardMaterial({ 
                color: color, transparent: true, opacity: 0.25 
            });
            const mesh = new THREE.Mesh(new THREE.TubeGeometry(curve, 48, radius, 8, false), mat);
            mesh.userData.origColor = color;
            mesh.userData.curve = curve; 
            mesh.userData.cableRadius = radius; // Für Oberflächen-Datenbits
            if (id) registerComponentMesh(id, mesh);
            pcGroup.add(mesh);
            return mesh;
        }

        function buildComputer() {
            const w = 2.4, h = 4.8, d = 4.5;
            
            // 1. MOTHERBOARD
            const mbGroup = new THREE.Group();
            const mbBase = createBox(0.1, 3.6, 3.0, colors.mb, 'mb');
            mbBase.position.set(0.95, 0.4, -0.6); 
            mbGroup.add(mbBase);

            const ioShield = createBox(0.15, 1.4, 0.3, 0xaaaaaa, 'mb');
            ioShield.position.set(0.95, 1.2, -2.25); 
            ioShield.userData.isExternal = true; 
            ioShield.userData.tooltipOnly = "Anschlüsse (Motherboard)"; 
            mbGroup.add(ioShield);

            const socket = createBox(0.12, 0.8, 0.8, 0x333333, 'mb');
            socket.position.set(0.92, 1.4, -1.0);
            mbGroup.add(socket);

            const pcie1 = createBox(0.15, 0.2, 1.6, 0x222222, 'mb');
            pcie1.position.set(0.9, -0.2, -1.0);
            mbGroup.add(pcie1);

            pcGroup.add(mbGroup);

            // 2. CPU
            const cpu = createBox(0.18, 0.6, 0.6, colors.cpu, 'cpu');
            cpu.position.set(0.88, 1.4, -1.0);
            pcGroup.add(cpu);

            // 3. RAM
            for(let i=0; i<2; i++) {
                const ram = createBox(0.18, 1.4, 0.1, colors.ram, 'ram');
                ram.position.set(0.85, 1.4, -0.3 + (i * 0.25));
                pcGroup.add(ram);
            }

            // 4. GPU
            const gpuGroup = new THREE.Group();
            const gpuPCB = createBox(1.2, 0.1, 2.4, 0x222222, 'gpu');
            gpuPCB.position.set(0.2, -0.2, -1.0); 

            const gpuShroud = createBox(1.1, 0.4, 2.3, colors.gpu, 'gpu');
            gpuShroud.position.set(0.2, -0.45, -1.0); 
            
            const gpuBracket = createBox(0.05, 0.6, 0.2, 0xaaaaaa, 'gpu');
            gpuBracket.position.set(0.8, -0.3, -2.3); 
            gpuBracket.userData.isExternal = true; 
            gpuBracket.userData.tooltipOnly = "Anschlüsse (GPU)"; 
            gpuGroup.add(gpuBracket);

            gpuGroup.add(gpuPCB);
            gpuGroup.add(gpuShroud);

            for(let i=0; i<2; i++) {
                const fan = createCylinder(0.4, 0.4, 0.05, 16, 0x111111, 'gpu');
                fan.position.set(0.2, -0.68, -0.5 - (i * 1.0));
                fan.userData.isFan = true; 
                
                const solidMat = new THREE.MeshStandardMaterial({ 
                    color: 0x000000, roughness: 0.8,
                    polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1 
                });
                const solidMesh = new THREE.Mesh(fan.geometry, solidMat);
                solidMesh.visible = false;
                fan.add(solidMesh);
                fan.userData.solidBg = solidMesh;

                fans.push(fan);
                gpuGroup.add(fan);
            }
            pcGroup.add(gpuGroup);

            // 5. PSU
            const psuGroup = new THREE.Group();
            const psuBox = createBox(1.6, 1.2, 1.8, colors.psu, 'psu');
            psuBox.position.set(0.0, -1.8, -1.4);
            psuBox.userData.isExternal = true; 
            psuGroup.add(psuBox);
            
            const psuFan = createCylinder(0.5, 0.5, 0.05, 16, 0x111111, 'psu');
            psuFan.position.set(0.0, -1.2, -1.4);
            psuFan.userData.isExternal = true;
            psuFan.userData.isFan = true;

            const psuSolidMat = new THREE.MeshStandardMaterial({ 
                color: 0x000000, roughness: 0.8,
                polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1 
            });
            const psuSolidMesh = new THREE.Mesh(psuFan.geometry, psuSolidMat);
            psuSolidMesh.visible = false;
            psuFan.add(psuSolidMesh);
            psuFan.userData.solidBg = psuSolidMesh;

            fans.push(psuFan);
            psuGroup.add(psuFan);

            pcGroup.add(psuGroup);

            // 6. SSD
            const bayGeom = new THREE.BoxGeometry(1.2, 0.05, 1.6);
            const bayMat = new THREE.MeshStandardMaterial({ color: 0x999999, transparent: true, opacity: 0.25 });
            const bayBottom = new THREE.Mesh(bayGeom, bayMat);
            bayBottom.position.set(0.2, -1.7, 1.4); 
            pcGroup.add(bayBottom);

            const bayTop = new THREE.Mesh(bayGeom, bayMat);
            bayTop.position.set(0.2, -1.45, 1.4); 
            pcGroup.add(bayTop);

            const ssd = createBox(1.0, 0.15, 1.4, colors.ssd, 'ssd');
            ssd.position.set(0.2, -1.58, 1.4);
            pcGroup.add(ssd);

            // 7. FRONT I/O (Ragt nun leicht aus dem Gehäuse (Z = 2.3) heraus, Gehäusefront ist bei Z = 2.25)
            const frontGroup = new THREE.Group();
            
            const ioBlock = createBox(0.8, 1.4, 0.1, colors.frontio, 'frontio');
            ioBlock.position.set(0.0, 1.3, 2.3); 
            ioBlock.userData.isExternal = true; // Immer sichtbar
            frontGroup.add(ioBlock);

            const powerBtn = createBox(0.25, 0.25, 0.08, 0x111111, 'frontio');
            powerBtn.position.set(0.2, 1.85, 2.35); 
            powerBtn.userData.isExternal = true;
            frontGroup.add(powerBtn);

            const symMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const ringGeom = new THREE.TorusGeometry(0.06, 0.015, 8, 16);
            const ring = new THREE.Mesh(ringGeom, symMat);
            ring.position.set(0.2, 1.85, 2.39); 
            frontGroup.add(ring);
            
            const lineGeom = new THREE.BoxGeometry(0.02, 0.08, 0.01);
            const line = new THREE.Mesh(lineGeom, symMat);
            line.position.set(0.2, 1.88, 2.39); 
            frontGroup.add(line);

            const usb1 = createBox(0.12, 0.05, 0.05, 0x000000, 'frontio');
            usb1.position.set(-0.25, 1.5, 2.33);
            usb1.userData.isExternal = true;
            frontGroup.add(usb1);
            
            const usb2 = createBox(0.12, 0.05, 0.05, 0x000000, 'frontio');
            usb2.position.set(-0.08, 1.5, 2.33);
            usb2.userData.isExternal = true;
            frontGroup.add(usb2);

            const usbc = createBox(0.08, 0.04, 0.05, 0x000000, 'frontio');
            usbc.position.set(-0.25, 1.35, 2.33);
            usbc.userData.isExternal = true;
            frontGroup.add(usbc);

            const audio = createCylinder(0.03, 0.03, 0.05, 16, 0x000000, 'frontio');
            audio.rotation.x = Math.PI / 2;
            audio.position.set(-0.08, 1.35, 2.33);
            audio.userData.isExternal = true;
            frontGroup.add(audio);

            const sdSlot = createBox(0.25, 0.02, 0.05, 0x000000, 'frontio');
            sdSlot.position.set(-0.16, 1.2, 2.33);
            sdSlot.userData.isExternal = true;
            frontGroup.add(sdSlot);

            pcGroup.add(frontGroup);

            // Kabel vom Front Panel ins Motherboard (90 Grad andocken)
            createCable([
                new THREE.Vector3(0.0, 1.0, 2.25), // Dockt an Rückseite von ioBlock (Z=2.3)
                new THREE.Vector3(0.0, 1.0, 1.5),  
                new THREE.Vector3(-0.6, -1.2, 1.5),   
                new THREE.Vector3(-0.6, -1.2, 0.0),   
                new THREE.Vector3(0.5, -1.2, 0.0),    
                new THREE.Vector3(0.88, -1.2, 0.0) 
            ], 0.04, 0x555555, 'frontio');


            // 8. KABEL
            // ACHTUNG: IDs wurden auf psu oder ssd geändert, damit sie als ein Bauteil gelten!
            createCable([
                new THREE.Vector3(0.0, -1.2, -0.6), 
                new THREE.Vector3(0.0, -0.9, -0.6), 
                new THREE.Vector3(0.4, -0.8, 0.4),  
                new THREE.Vector3(0.4, 0.4, 0.4),   
                new THREE.Vector3(0.7, 0.4, 0.4),   
                new THREE.Vector3(0.88, 0.4, 0.4)   
            ], 0.08, colors.c_mb, 'psu'); // c_mb -> psu

            createCable([
                new THREE.Vector3(-0.4, -1.2, -0.8), 
                new THREE.Vector3(-0.4, -0.9, -0.8), 
                new THREE.Vector3(-0.8, -0.5, -0.8), 
                new THREE.Vector3(-0.8, 1.7, -0.8),  
                new THREE.Vector3(0.6, 1.7, -1.0),   
                new THREE.Vector3(0.88, 1.7, -1.0)   
            ], 0.05, colors.c_cpu, 'psu'); // c_cpu -> psu

            createCable([
                new THREE.Vector3(-0.25, -1.2, -0.7),  
                new THREE.Vector3(-0.25, -0.9, -0.7),  
                new THREE.Vector3(-0.6, -0.8, -0.2),  
                new THREE.Vector3(-0.6, -0.2, 0.0),   
                new THREE.Vector3(-0.4, -0.2, 0.0)    
            ], 0.06, colors.c_gpu, 'psu'); // c_gpu -> psu

            createCable([
                new THREE.Vector3(0.88, -0.8, 0.8),   
                new THREE.Vector3(0.6, -0.8, 0.8),    
                new THREE.Vector3(0.6, -1.58, 0.5),   
                new THREE.Vector3(0.2, -1.58, 0.5),   
                new THREE.Vector3(0.2, -1.58, 0.7)    
            ], 0.05, colors.c_ssd, 'ssd'); // c_ssd -> ssd

            createCable([
                new THREE.Vector3(0.0, -1.8, -2.3),
                new THREE.Vector3(0.0, -1.8, -3.5),
                new THREE.Vector3(-1.0, -2.4, -5.0)
            ], 0.08, colors.c_ext, 'psu'); // c_ext -> psu

            // --- GEHÄUSE ---
            const addPanel = (pw, ph, pd, px, py, pz, ex, ey, ez) => {
                const geom = new THREE.BoxGeometry(pw, ph, pd);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: colors.case, roughness: 0.5, metalness: 0.3, 
                    transparent: false, opacity: 1.0 
                });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.set(px, py, pz);
                
                // Explodiert nun VIEL weiter weg (* 1.8)
                const openPos = new THREE.Vector3(px + (ex * 1.8), py + (ey * 1.8), pz + (ez * 1.8));
                const panelObj = { mesh: mesh, closedPos: new THREE.Vector3(px, py, pz), openPos: openPos };
                casePanels.push(panelObj);
                pcGroup.add(mesh);
            };

            const t = 0.05;
            addPanel(t, h, d, -w/2, 0, 0,    -4, 0, 0); 
            addPanel(t, h, d, w/2, 0, 0,     4, 0, 0);  
            addPanel(w, t, d, 0, h/2, 0,     0, 4, 0);  
            addPanel(w, t, d, 0, -h/2, 0,    0, -1, 0); 
            addPanel(w, h, t, 0, 0, d/2,     0, 0, 4);  
            addPanel(w, h, t, 0, 0, -d/2,    0, 0, -2); 

            // Ghost Case
            ghostCase = new THREE.Group();
            const ghostGeom = new THREE.BoxGeometry(w, h, d);
            const edgesGeom = new THREE.EdgesGeometry(ghostGeom);
            const ghostMat = new THREE.LineBasicMaterial({ color: 0x222222, transparent: true, opacity: 0 });
            
            const offsets = [-0.005, 0, 0.005];
            for(let ox of offsets) {
                for(let oy of offsets) {
                    const line = new THREE.LineSegments(edgesGeom, ghostMat);
                    line.position.set(ox, oy, 0);
                    ghostCase.add(line);
                }
            }
            pcGroup.add(ghostCase);
        }

        function moveCameraTo(compId) {
            const views = {
                'mb': { pos: new THREE.Vector3(-14, 5, 4), look: new THREE.Vector3(0.9, 0.4, -0.6) },
                'cpu': { pos: new THREE.Vector3(-10, 6, 0), look: new THREE.Vector3(0.88, 1.4, -1.0) },
                'ram': { pos: new THREE.Vector3(-10, 6, 1), look: new THREE.Vector3(0.85, 1.4, -0.3) },
                'gpu': { pos: new THREE.Vector3(-12, 0, 3), look: new THREE.Vector3(0.2, -0.4, -1.0) },
                'psu': { pos: new THREE.Vector3(-10, 4, -9), look: new THREE.Vector3(0.0, -1.8, -1.4) }, 
                'ssd': { pos: new THREE.Vector3(-11, -1, 7), look: new THREE.Vector3(0.2, -1.58, 1.4) },
                'frontio': { pos: new THREE.Vector3(-8, 7, 11), look: new THREE.Vector3(0, 1.5, 2.25) },
                'reset': { pos: new THREE.Vector3(-16, 10, 18), look: new THREE.Vector3(0, 0, 0) }
            };

            if (compId === 'case') compId = 'reset';

            if (views[compId]) {
                camTargetPos.copy(views[compId].pos);
                camTargetLook.copy(views[compId].look);
                camStartPos.copy(camera.position);
                camStartLook.copy(controls.target);
                camAnimProgress = 0;
                isAnimatingCamera = true;
            }
        }

        function openCase() {
            if(caseState === 'opened' || caseState === 'opening') return;
            caseState = 'opening';
            casePanels.forEach(p => { 
                p.mesh.visible = true; 
                p.mesh.material.transparent = true; 
            });
        }

        function closeCase() {
            if(caseState === 'closed' || caseState === 'closing') return;
            caseState = 'closing';
            casePanels.forEach(p => { p.mesh.visible = true; });
        }

        function updateMaterials() {
            Object.keys(componentMeshes).forEach(id => {
                const isHovered = (id === hoveredId);
                const isClicked = (id === clickedId);
                const shouldBeSolid = isHovered || isClicked;
                
                componentMeshes[id].forEach(mesh => {
                    if(mesh.userData.isFan) {
                        mesh.material.wireframe = true; 
                        const isCaseClosedExternal = (caseState === 'closed' && mesh.userData.isExternal);
                        
                        if(shouldBeSolid || isCaseClosedExternal) mesh.userData.solidBg.visible = true;
                        else mesh.userData.solidBg.visible = false;

                        if(shouldBeSolid) {
                            mesh.material.color.setHex(0xaaaaaa); 
                            mesh.material.emissive.setHex(0x555555); 
                            mesh.material.opacity = 1.0;
                        } else {
                            mesh.material.color.setHex(mesh.userData.origColor);
                            mesh.material.emissiveIntensity = 0;
                            mesh.material.opacity = 0.25;
                        }
                        return;
                    }

                    mesh.material.wireframe = false;
                    
                    if(shouldBeSolid || (caseState === 'closed' && mesh.userData.isExternal)) {
                        mesh.material.opacity = 1.0;
                    } else {
                        mesh.material.opacity = 0.25;
                    }

                    if(shouldBeSolid) {
                        mesh.material.emissive.setHex(mesh.material.color.getHex());
                    } else {
                        mesh.material.emissiveIntensity = 0;
                    }
                });
            });
        }

        function showPresStep(id) {
            clickedId = id;
            moveCameraTo(clickedId);

            document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('active'));
            const activeAcc = document.getElementById('acc-' + clickedId);
            if(activeAcc) {
                activeAcc.classList.add('active');
                setTimeout(() => {
                    activeAcc.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }

            if(clickedId === 'case') closeCase();
            else openCase();

            pulseGroup.clear();
            activePulses.length = 0;
            updateMaterials();
        }

        function deselectAll() {
            clickedId = null;
            document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('active'));
            moveCameraTo('reset');
            pulseGroup.clear();
            activePulses.length = 0;
            updateMaterials();
        }

        // --- PULS ANIMATIONEN (KABEL) ---
        function spawnPulse(cableMesh, type) {
            const curve = cableMesh.userData.curve;
            if(!curve) return;

            let mesh, speed, dir;

            if (type === 'power') {
                const r = (cableMesh.userData.cableRadius || 0.06) * 1.4;
                const core = new THREE.Mesh(
                    new THREE.SphereGeometry(r, 8, 8),
                    new THREE.MeshBasicMaterial({
                        color: 0xffdd55,
                        transparent: true,
                        opacity: 0.95,
                        blending: THREE.AdditiveBlending
                    })
                );
                const halo = new THREE.Mesh(
                    new THREE.SphereGeometry(r * 1.1, 8, 8),
                    new THREE.MeshBasicMaterial({
                        color: 0xffaa00,
                        transparent: true,
                        opacity: 0.18,
                        blending: THREE.AdditiveBlending
                    })
                );
                core.add(halo);
                mesh = core;
                speed = 0.005;
                dir = (cableMesh.userData.origColor === colors.c_ext) ? -1 : 1;
            } else if (type === 'data') {
                // Daten-Bits flitzen auf der Außenhülle!
                mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.02, 8, 8),
                    new THREE.MeshBasicMaterial({ 
                        color: 0x00e5ff,
                        transparent: true,
                        blending: THREE.AdditiveBlending 
                    })
                );
                speed = 0.015; 
                dir = Math.random() > 0.5 ? 1 : -1; 
                
                // Offset berechnen (Radius + leicht darüber)
                const radius = cableMesh.userData.cableRadius + 0.01;
                const angle = Math.random() * Math.PI * 2;
                mesh.userData.offsetRadius = radius;
                mesh.userData.offsetAngle = angle;
            }

            pulseGroup.add(mesh);
            activePulses.push({
                mesh: mesh, curve: curve,
                t: dir === 1 ? 0 : 1,
                speed: speed, dir: dir, type: type
            });
        }

        function onMouseMove(event) {
            if(!isTourActive) return;

            const rect = canvasEl.getBoundingClientRect();
            if(event.clientX < rect.left || event.clientX > rect.right || event.clientY < rect.top || event.clientY > rect.bottom) {
                hoveredId = null;
                document.getElementById('tooltip').style.opacity = 0;
                document.body.style.cursor = 'default';
                updateMaterials();
                return;
            }

            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(pickableObjects.filter(m => m.visible));

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                
                if (hit.userData.tooltipOnly) {
                    const tt = document.getElementById('tooltip');
                    tt.innerText = hit.userData.tooltipOnly;
                    tt.style.left = event.clientX + 'px';
                    tt.style.top = event.clientY + 'px';
                    tt.style.opacity = 1;
                    document.body.style.cursor = 'default';
                    hoveredId = null;
                } else {
                    hoveredId = hit.userData.compId;
                    document.body.style.cursor = 'pointer';

                    const tt = document.getElementById('tooltip');
                    tt.innerText = compData[hoveredId].title.replace(/^\d+\.\s*/, '');
                    tt.style.left = event.clientX + 'px';
                    tt.style.top = event.clientY + 'px';
                    tt.style.opacity = 1;
                }
            } else {
                hoveredId = null;
                document.body.style.cursor = 'default';
                document.getElementById('tooltip').style.opacity = 0;
            }
            updateMaterials();
        }

        function onClick(event) {
            if(!isTourActive) return;
            const rect = canvasEl.getBoundingClientRect();
            if(event.clientX < rect.left || event.clientX > rect.right || event.clientY < rect.top || event.clientY > rect.bottom) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(pickableObjects.filter(m => m.visible));

            if (intersects.length > 0 && !intersects[0].object.userData.tooltipOnly) {
                const hitId = intersects[0].object.userData.compId;
                if(hitId === clickedId) {
                    deselectAll(); // Klick auf selbes -> schließen
                } else {
                    showPresStep(hitId);
                }
            } else {
                deselectAll();
            }
        }

        function updateCameraZoom() {
            if(window.innerWidth <= 768) {
                if (document.body.classList.contains('mobile-panel-active')) {
                    camera.zoom = 1.3; 
                } else {
                    camera.zoom = 1.0;
                }
            } else {
                camera.zoom = 1.0;
            }
            camera.updateProjectionMatrix();
        }

        function onWindowResize() {
            const width = canvasEl.clientWidth;
            const height = canvasEl.clientHeight;
            camera.aspect = width / height;
            updateCameraZoom();
            renderer.setSize(width, height);
        }

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (isAnimatingCamera) {
                camAnimProgress += 0.025; 
                if (camAnimProgress >= 1) {
                    camAnimProgress = 1;
                    isAnimatingCamera = false;
                }
                const t = camAnimProgress < 0.5 
                    ? 4 * camAnimProgress * camAnimProgress * camAnimProgress 
                    : 1 - Math.pow(-2 * camAnimProgress + 2, 3) / 2;

                camera.position.lerpVectors(camStartPos, camTargetPos, t);
                controls.target.lerpVectors(camStartLook, camTargetLook, t);
            }

            controls.update();
            fans.forEach(fan => fan.rotation.y += 0.2);

            // Pulsierendes Leuchten (Kabel pulsieren NICHT im Material, sondern haben fließende Partikel)
            if (clickedId && componentMeshes[clickedId]) {
                componentMeshes[clickedId].forEach(mesh => {
                    if(!mesh.userData.isFan && !mesh.userData.curve) {
                        mesh.material.emissiveIntensity = 0.4 + Math.sin(performance.now() * 0.012) * 0.2; 
                    }
                });
            }
            if (hoveredId && hoveredId !== clickedId && componentMeshes[hoveredId]) {
                componentMeshes[hoveredId].forEach(mesh => {
                    if(!mesh.userData.isFan && !mesh.userData.curve) {
                        mesh.material.emissiveIntensity = 0.25;
                    }
                });
            }

            // --- Kabel Pulse Updates ---
            frameCount++;
            if (clickedId === 'psu') {
                if (frameCount % 20 === 0) {
                    componentMeshes['psu'].forEach(mesh => {
                        if(mesh.userData.curve) spawnPulse(mesh, 'power');
                    });
                }
            }
            if (clickedId === 'ssd' || clickedId === 'frontio') {
                if (Date.now() > nextDataBurst) {
                    if (Math.random() > 0.6) {
                        componentMeshes[clickedId].forEach(mesh => {
                            if(mesh.userData.curve) spawnPulse(mesh, 'data');
                        });
                    }
                    if (Math.random() > 0.95) nextDataBurst = Date.now() + 400;
                }
            }

            for (let i = activePulses.length - 1; i >= 0; i--) {
                const p = activePulses[i];
                p.t += p.speed * p.dir;
                
                if (p.t < 0 || p.t > 1) {
                    pulseGroup.remove(p.mesh);
                    activePulses.splice(i, 1);
                    continue;
                }

                const pos = p.curve.getPointAt(p.t);

                if (p.type === 'data') {
                    // Partikel auf der Oberfläche des Kabels platzieren
                    const tangent = p.curve.getTangentAt(p.t);
                    // Hilfsvektor für Rotation
                    const axis = new THREE.Vector3(0, 1, 0);
                    if (Math.abs(tangent.y) > 0.9) axis.set(1, 0, 0); 
                    
                    const normal = new THREE.Vector3().crossVectors(tangent, axis).normalize();
                    const binormal = new THREE.Vector3().crossVectors(tangent, normal).normalize();

                    // Offset-Berechnung mittels Kreisgleichung
                    const r = p.mesh.userData.offsetRadius;
                    const a = p.mesh.userData.offsetAngle;
                    
                    const offset = new THREE.Vector3();
                    offset.addScaledVector(normal, Math.cos(a) * r);
                    offset.addScaledVector(binormal, Math.sin(a) * r);
                    
                    p.mesh.position.copy(pos).add(offset);
                } else {
                    // Stromkugeln bleiben mittig im Kabel
                    p.mesh.position.copy(pos);
                }
            }

            // Gehäuse Animation
            if (caseState === 'opening') {
                let allDone = true;
                if (ghostCase.children[0].material.opacity < 0.3) {
                    ghostCase.children.forEach(c => c.material.opacity += 0.02);
                }
                casePanels.forEach(p => {
                    // Schneller und doppelt so weit explodieren!
                    p.mesh.position.lerp(p.openPos, 0.1); 
                    p.mesh.material.opacity -= 0.05; // Schneller faden
                    if (p.mesh.position.distanceTo(p.openPos) > 0.1) allDone = false;
                });
                if (allDone) {
                    caseState = 'opened';
                    casePanels.forEach(p => p.mesh.visible = false);
                }
            } else if (caseState === 'closing') {
                let allDone = true;
                if (ghostCase.children[0].material.opacity > 0) {
                    ghostCase.children.forEach(c => c.material.opacity -= 0.02);
                }
                casePanels.forEach(p => {
                    p.mesh.material.opacity += 0.05;
                    if(p.mesh.material.opacity > 1) {
                        p.mesh.material.opacity = 1;
                        p.mesh.material.transparent = false; // Solid wenn zu
                    }
                    p.mesh.position.lerp(p.closedPos, 0.1);
                    if (p.mesh.position.distanceTo(p.closedPos) > 0.05) allDone = false;
                });
                if (allDone) {
                    caseState = 'closed';
                    updateMaterials(); 
                }
            }

            renderer.render(scene, camera);
        }
    </script>
